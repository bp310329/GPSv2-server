<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker & Navigator Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 320px;
            background-color: #1e1e24;
            color: #fff;
            padding: 25px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        #sidebar h2 {
            margin-top: 0;
            border-bottom: 2px solid #3a3a44;
            padding-bottom: 10px;
            color: #00adb5;
        }

        .instruction {
            font-size: 14px;
            color: #b3b3b3;
            line-height: 1.5;
        }

        .actions {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .primary-btn {
            background-color: #00adb5;
            color: #fff;
        }

        .primary-btn:hover {
            background-color: #008f96;
        }

        .danger-btn {
            background-color: #ff2e63;
            color: #fff;
        }

        .danger-btn:hover {
            background-color: #e02251;
        }

        #map {
            flex-grow: 1;
            height: 100%;
        }

        .mode-container {
            text-align: center;
            background: #2a2a35;
            padding: 15px;
            border-radius: 8px;
        }
        .mode-container p {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #b3b3b3;
        }
        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        .status-history {
            background-color: #007bff;
            color: #fff;
        }
        .status-planning {
            background-color: #ff9f43;
            color: #000;
        }
        .secondary-btn {
            background-color: #4e4e5a;
            color: #fff;
            width: 100%;
        }
        .secondary-btn:hover {
            background-color: #636373;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>GPS Dashboard</h2>
    
        <div class="mode-container">
            <p>Aktualny tryb serwera:</p>
            <div id="mode-badge" class="badge status-history">Tryb Historii</div>
            <button id="toggle-mode-btn" class="secondary-btn">Przełącz tryb pracy</button>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #3a3a44; margin: 20px 0;">

        <div id="planning-controls" style="display: none;">
            <p class="instruction">Klikaj na mapie, aby dodawać punkty trasy dla Twojego urządzenia.</p>
            <div class="actions">
                <button id="send-btn" class="primary-btn">Wyślij punkty do urządzenia</button>
                <button id="clear-btn" class="danger-btn">Wyczyść punkty</button>
            </div>
        </div>
        
        <div id="history-controls">
            <p class="instruction">Mapa wyświetla historyczną trasę urządzenia pobraną z bazy danych SQLite.</p>
            
            <button id="clear-history-btn" class="danger-btn" style="margin-top: 15px; width: 100%;">
                Wyczyść historię tras
            </button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/map.js"></script>
</body>
</html>
